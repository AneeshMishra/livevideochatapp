  postgres-tipping:
    image: postgres:16-alpine
    container_name: platform-postgres-tipping
    restart: unless-stopped
    environment:
      POSTGRES_DB: tipping_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5438:5432"
    volumes:
      - postgres-tipping-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tipping_db"]
      interval: 10s
