  kyc-service:
    build:
      context: ./services/kyc-service
      dockerfile: Dockerfile
    container_name: kyc-service
    restart: unless-stopped
    ports:
      - "8093:8093"
    environment:
      SERVER_PORT: "8093"
      JWT_SECRET: "${JWT_SECRET:?Set JWT_SECRET in .env -- run: openssl rand -base64 32}"
      DB_URL: "jdbc:postgresql://postgres-kyc:5432/kyc_db"
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      # KYC vendor: MOCK (dev) | VERIFF | YOTI | PERSONA
      KYC_PROVIDER: "${KYC_PROVIDER:-MOCK}"
      KYC_VALIDITY_DAYS: "${KYC_VALIDITY_DAYS:-730}"
      VERIFF_API_KEY: "${VERIFF_API_KEY:-}"
      VERIFF_BASE_URL: "${VERIFF_BASE_URL:-https://stationapi.veriff.com}"
      VERIFF_WEBHOOK_SECRET: "${VERIFF_WEBHOOK_SECRET:-}"
      PERSONA_API_KEY: "${PERSONA_API_KEY:-}"
      PERSONA_WEBHOOK_SECRET: "${PERSONA_WEBHOOK_SECRET:-}"
      # Document storage — MinIO (dev) / S3 (prod)
      STORAGE_PROVIDER: "${STORAGE_PROVIDER:-MOCK}"
      S3_KYC_BUCKET: "${S3_KYC_BUCKET:-platform-kyc-docs}"
      S3_ENDPOINT_URL: "http://minio:9000"
      S3_ACCESS_KEY: "${MINIO_ROOT_USER:-minioadmin}"
      S3_SECRET_KEY: "${MINIO_ROOT_PASSWORD:-minioadmin123}"
      AWS_REGION: "${AWS_REGION:-us-east-1}"
      # AES-256 key for PII encryption in 2257 records (base64-encoded 32 bytes)
      ENCRYPTION_KEY: "${ENCRYPTION_KEY:-dGhpcyBpcyBhIDMyLWJ5dGUgZGV2IGtleS4uLi4h}"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres-kyc:
        condition: service_healthy
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
      identity-auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8093/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - platform-net

