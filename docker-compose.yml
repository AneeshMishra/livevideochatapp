    container_name: platform-postgres-kyc
    restart: unless-stopped
    environment:
      POSTGRES_DB: kyc_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5444:5432"
    volumes:
      - postgres-kyc-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kyc_db"]
