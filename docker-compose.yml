      DB_URL: "jdbc:postgresql://postgres-catalog:5432/catalog_db"
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      REDIS_URL: "redis://redis:6379"
      OPENSEARCH_URL: "http://opensearch:9200"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_STREAMING_TOPIC: "streaming.events"
      KAFKA_PRESENCE_TOPIC: "presence.events"
      KAFKA_GROUP_ID: "catalog-discovery-service"
      JWT_SECRET: "${JWT_SECRET:?Set JWT_SECRET in .env -- run: openssl rand -base64 32}"
      BROADCASTER_SERVICE_URL: "http://broadcaster-service:8080"
      GRID_CACHE_TTL_SEC: ${GRID_CACHE_TTL_SEC:-10}
      ROOM_CACHE_TTL_SEC: ${ROOM_CACHE_TTL_SEC:-30}
      TRENDING_MAX_ROOMS: ${TRENDING_MAX_ROOMS:-50}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres-catalog:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      identity-auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8089/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - platform-net

