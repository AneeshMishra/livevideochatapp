  postgres-wallet:
    image: postgres:16-alpine
    container_name: platform-postgres-wallet
    restart: unless-stopped
    environment:
      POSTGRES_DB: wallet_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
