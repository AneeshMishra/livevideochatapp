      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_STREAMING_TOPIC: "streaming.events"
      KAFKA_MODERATION_TOPIC: "moderation.events"
      KAFKA_GROUP_ID: "moderation-service"
      JWT_SECRET: "${JWT_SECRET:?Set JWT_SECRET in .env -- run: openssl rand -base64 32}"
      MODERATION_PROVIDER: "${MODERATION_PROVIDER:-MOCK}"
      AWS_REGION: "${AWS_REGION:-us-east-1}"
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID:-}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY:-}"
      S3_ENDPOINT_URL: "http://minio:9000"
      S3_BUCKET: "platform-moderation"
      S3_ACCESS_KEY: "${MINIO_ROOT_USER:-minioadmin}"
      S3_SECRET_KEY: "${MINIO_ROOT_PASSWORD:-minioadmin123}"
      AI_UNSAFE_THRESHOLD: "${AI_UNSAFE_THRESHOLD:-0.70}"
      AI_CSAM_THRESHOLD: "${AI_CSAM_THRESHOLD:-0.50}"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres-moderation:
        condition: service_healthy
