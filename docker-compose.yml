# Root docker-compose — runs ALL services + shared infrastructure
#
# Usage:
#   cp .env.example .env   # fill in JWT_SECRET (see below)
#   docker compose up --build
#
# JWT_SECRET must be a base64-encoded 256-bit random key shared by all services.
# Generate with:  openssl rand -base64 32
#
# Services running:
#   8080  broadcaster-service     — broadcaster profiles, tip menus, stream config
#   8081  identity-auth-service   — registration, login, JWT issuance
#   8082  user-profile-service    — viewer profiles, follows, blocklist
#   8083  wallet-service          — token balances, double-entry ledger, transfers
#   8084  payments-service        — token purchases via CCBill/Epoch/SegPay, webhook handling
#   8085  tipping-service         — tip send/receive, tip-menu, goal tracking, Kafka fan-out
#   8086  chat-service            — real-time WebSocket chat, Redis fan-out, ScyllaDB history
#   8087  presence-service        — online/offline state, viewer counts, heartbeat TTL in Redis
#   8088  streaming-orchestration — room lifecycle, IVS channel provision, WebRTC→LL-HLS promotion

services:

  # ════════════════════════════════════════════════════════════════════════════
  # SHARED INFRASTRUCTURE
  # ════════════════════════════════════════════════════════════════════════════

  # ── Redis (shared: chat pub/sub fan-out, presence, rate-limiting, leaderboards)
  redis:
    image: redis:7-alpine
    container_name: platform-redis
    restart: unless-stopped
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru --appendonly no
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - platform-net

  # ── ScyllaDB (chat history — high write throughput, time-series, 7-day TTL)
  scylla:
    image: scylladb/scylla:6.0
    container_name: platform-scylla
    restart: unless-stopped
    # Developer mode: disable CPU pinning; tune for a single shared host
    command: --smp 1 --memory 1G --overprovisioned 1 --developer-mode 1
    ports:
      - "9042:9042"
    volumes:
      - scylla-data:/var/lib/scylla
    healthcheck:
      test: ["CMD-SHELL", "nodetool status | grep -E '^UN'"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 90s
    networks:
      - platform-net

  # Single Kafka in KRaft mode (no Zookeeper required)
  kafka:
    image: confluentinc/cp-kafka:7.7.0
    container_name: platform-kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: platform-cluster-01
    ports:
      - "29092:29092"     # host access for local tools (Kafka UI, kafkacat)
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 8
    networks:
      - platform-net

  # Kafka UI (optional dev tool — http://localhost:8090)
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: platform-kafka-ui
    restart: unless-stopped
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: platform
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - platform-net
    profiles: ["tools"]   # only started with: docker compose --profile tools up

  # ════════════════════════════════════════════════════════════════════════════
  # DATABASES (one per service — database-per-service pattern)
  # ════════════════════════════════════════════════════════════════════════════

  postgres-auth:
    image: postgres:16-alpine
    container_name: platform-postgres-auth
    restart: unless-stopped
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5433:5432"
    volumes:
      - postgres-auth-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - platform-net

  postgres-broadcaster:
    image: postgres:16-alpine
    container_name: platform-postgres-broadcaster
    restart: unless-stopped
    environment:
      POSTGRES_DB: broadcaster_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5434:5432"
    volumes:
      - postgres-broadcaster-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d broadcaster_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - platform-net

  postgres-user-profile:
    image: postgres:16-alpine
    container_name: platform-postgres-user-profile
    restart: unless-stopped
    environment:
      POSTGRES_DB: user_profile_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5435:5432"
    volumes:
      - postgres-user-profile-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d user_profile_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - platform-net

  postgres-streaming:
    image: postgres:16-alpine
    container_name: platform-postgres-streaming
    restart: unless-stopped
    environment:
      POSTGRES_DB: streaming_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5439:5432"
    volumes:
      - postgres-streaming-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d streaming_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - platform-net

  postgres-tipping:
    image: postgres:16-alpine
    container_name: platform-postgres-tipping
    restart: unless-stopped
    environment:
      POSTGRES_DB: tipping_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5438:5432"
    volumes:
      - postgres-tipping-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tipping_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - platform-net

  postgres-payments:
    image: postgres:16-alpine
    container_name: platform-postgres-payments
    restart: unless-stopped
    environment:
      POSTGRES_DB: payment_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5437:5432"
    volumes:
      - postgres-payments-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d payment_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - platform-net

  postgres-wallet:
    image: postgres:16-alpine
    container_name: platform-postgres-wallet
    restart: unless-stopped
    environment:
      POSTGRES_DB: wallet_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5436:5432"
    volumes:
      - postgres-wallet-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d wallet_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - platform-net

  # ════════════════════════════════════════════════════════════════════════════
  # MICROSERVICES
  # ════════════════════════════════════════════════════════════════════════════

  identity-auth-service:
    build:
      context: ./services/identity-auth-service
      dockerfile: Dockerfile
    container_name: identity-auth-service
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      DB_URL: jdbc:postgresql://postgres-auth:5432/auth_db
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_SECRET: "${JWT_SECRET:?Set JWT_SECRET in .env -- run: openssl rand -base64 32}"
      JWT_ACCESS_TTL_MINUTES: ${JWT_ACCESS_TTL_MINUTES:-15}
      JWT_REFRESH_TTL_DAYS: ${JWT_REFRESH_TTL_DAYS:-7}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres-auth:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - platform-net

  user-profile-service:
    build:
      context: ./services/user-profile-service
      dockerfile: Dockerfile
    container_name: user-profile-service
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      DB_URL: jdbc:postgresql://postgres-user-profile:5432/user_profile_db
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres-user-profile:
        condition: service_healthy
      kafka:
        condition: service_healthy
      identity-auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - platform-net

  broadcaster-service:
    build:
      context: ./services/broadcaster-service
      dockerfile: Dockerfile
    container_name: broadcaster-service
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres-broadcaster:5432/broadcaster_db
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      # Same HMAC secret used by identity-auth-service to sign tokens
      JWT_PUBLIC_KEY: ${JWT_SECRET:?Set JWT_SECRET in .env}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres-broadcaster:
        condition: service_healthy
      kafka:
        condition: service_healthy
      identity-auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - platform-net

  tipping-service:
    build:
      context: ./services/tipping-service
      dockerfile: Dockerfile
    container_name: tipping-service
    restart: unless-stopped
    ports:
      - "8085:8085"
    environment:
      DB_URL: jdbc:postgresql://postgres-tipping:5432/tipping_db
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_SECRET: "${JWT_SECRET:?Set JWT_SECRET in .env -- run: openssl rand -base64 32}"
      # wallet-service is on the same platform-net bridge
      WALLET_SERVICE_URL: http://wallet-service:8083
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres-tipping:
        condition: service_healthy
      kafka:
        condition: service_healthy
      wallet-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8085/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - platform-net

  payments-service:
    build:
      context: ./services/payments-service
      dockerfile: Dockerfile
    container_name: payments-service
    restart: unless-stopped
    ports:
      - "8084:8084"
    environment:
      DB_URL: jdbc:postgresql://postgres-payments:5432/payment_db
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_SECRET: "${JWT_SECRET:?Set JWT_SECRET in .env -- run: openssl rand -base64 32}"
      CCBILL_ACCOUNT_NUMBER: ${CCBILL_ACCOUNT_NUMBER:-888888}
      CCBILL_SUB_ACCOUNT: ${CCBILL_SUB_ACCOUNT:-0000}
      CCBILL_FLEX_FORM_ID: ${CCBILL_FLEX_FORM_ID:-}
      CCBILL_DIGEST_KEY: ${CCBILL_DIGEST_KEY:-}
      EPOCH_MERCHANT_ID: ${EPOCH_MERCHANT_ID:-}
      EPOCH_SECRET_KEY: ${EPOCH_SECRET_KEY:-}
      SEGPAY_MERCHANT_ID: ${SEGPAY_MERCHANT_ID:-}
      SEGPAY_SECRET_KEY: ${SEGPAY_SECRET_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres-payments:
        condition: service_healthy
      kafka:
        condition: service_healthy
      identity-auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8084/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - platform-net

  wallet-service:
    build:
      context: ./services/wallet-service
      dockerfile: Dockerfile
    container_name: wallet-service
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      DB_URL: jdbc:postgresql://postgres-wallet:5432/wallet_db
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_SECRET: "${JWT_SECRET:?Set JWT_SECRET in .env -- run: openssl rand -base64 32}"
      PLATFORM_FEE_BPS: ${PLATFORM_FEE_BPS:-500}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres-wallet:
        condition: service_healthy
      kafka:
        condition: service_healthy
      identity-auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - platform-net

  chat-service:
    build:
      context: ./services/chat-service
      dockerfile: Dockerfile
    container_name: chat-service
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      PORT: "8086"
      JWT_SECRET: "${JWT_SECRET:?Set JWT_SECRET in .env -- run: openssl rand -base64 32}"
      REDIS_URL: "redis://redis:6379"
      SCYLLA_HOSTS: "scylla:9042"
      SCYLLA_KEYSPACE: "chat"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TIPPING_TOPIC: "tipping.events"
      KAFKA_GROUP_ID: "chat-service"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      RATE_LIMIT_MESSAGES: ${RATE_LIMIT_MESSAGES:-5}
      RATE_LIMIT_WINDOW_SEC: ${RATE_LIMIT_WINDOW_SEC:-5}
    depends_on:
      redis:
        condition: service_healthy
      scylla:
        condition: service_healthy
      kafka:
        condition: service_healthy
      identity-auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8086/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - platform-net

  presence-service:
    build:
      context: ./services/presence-service
      dockerfile: Dockerfile
    container_name: presence-service
    restart: unless-stopped
    ports:
      - "8087:8087"
    environment:
      PORT: "8087"
      JWT_SECRET: "${JWT_SECRET:?Set JWT_SECRET in .env -- run: openssl rand -base64 32}"
      REDIS_URL: "redis://redis:6379"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_PRESENCE_TOPIC: "presence.events"
      HEARTBEAT_TTL_SEC: ${HEARTBEAT_TTL_SEC:-30}
      SWEEPER_INTERVAL_SEC: ${SWEEPER_INTERVAL_SEC:-30}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      identity-auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8087/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - platform-net

  streaming-orchestration-service:
    build:
      context: ./services/streaming-orchestration-service
      dockerfile: Dockerfile
    container_name: streaming-orchestration-service
    restart: unless-stopped
    ports:
      - "8088:8088"
    environment:
      PORT: "8088"
      JWT_SECRET: "${JWT_SECRET:?Set JWT_SECRET in .env -- run: openssl rand -base64 32}"
      DB_URL: "postgres://postgres:${POSTGRES_PASSWORD:-postgres}@postgres-streaming:5432/streaming_db"
      REDIS_URL: "redis://redis:6379"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_STREAMING_TOPIC: "streaming.events"
      KAFKA_PRESENCE_TOPIC: "presence.events"
      KAFKA_GROUP_ID: "streaming-orchestration-service"
      STREAMING_PROVIDER: "${STREAMING_PROVIDER:-MOCK}"
      AWS_REGION: "${AWS_REGION:-us-east-1}"
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID:-}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY:-}"
      PROMOTION_THRESHOLD: "${PROMOTION_THRESHOLD:-1000}"
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres-streaming:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      identity-auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8088/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - platform-net

# ════════════════════════════════════════════════════════════════════════════
# VOLUMES & NETWORKS
# ════════════════════════════════════════════════════════════════════════════

volumes:
  kafka-data:
  redis-data:
  scylla-data:
  postgres-auth-data:
  postgres-streaming-data:
  postgres-broadcaster-data:
  postgres-user-profile-data:
  postgres-tipping-data:
  postgres-payments-data:
  postgres-wallet-data:

networks:
  platform-net:
    driver: bridge
