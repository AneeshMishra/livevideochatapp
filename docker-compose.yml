  # ════════════════════════════════════════════════════════════════════════════
  # MICROSERVICES
  # ════════════════════════════════════════════════════════════════════════════

  api-gateway-service:
    build:
      context: ./services/api-gateway-service
      dockerfile: Dockerfile
    container_name: api-gateway-service
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      PORT: "8000"
      JWT_SECRET: "${JWT_SECRET:?Set JWT_SECRET in .env -- run: openssl rand -base64 32}"
      REDIS_URL: "redis://redis:6379"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:-*}"
      RATE_LIMIT_ANONYMOUS_PER_MIN: "${RATE_LIMIT_ANONYMOUS_PER_MIN:-30}"
      RATE_LIMIT_AUTH_PER_MIN: "${RATE_LIMIT_AUTH_PER_MIN:-120}"
      # Downstream service URLs (internal Docker network)
      IDENTITY_AUTH_URL: "http://identity-auth-service:8081"
      USER_PROFILE_URL: "http://user-profile-service:8082"
      BROADCASTER_URL: "http://broadcaster-service:8080"
      WALLET_URL: "http://wallet-service:8083"
      PAYMENTS_URL: "http://payments-service:8084"
      TIPPING_URL: "http://tipping-service:8085"
      CHAT_URL: "http://chat-service:8086"
      PRESENCE_URL: "http://presence-service:8087"
      STREAMING_URL: "http://streaming-orchestration-service:8088"
      CATALOG_URL: "http://catalog-discovery-service:8089"
      MODERATION_URL: "http://moderation-service:8090"
      PRIVATE_SHOW_URL: "http://private-show-billing-service:8091"
      NOTIFICATION_URL: "http://notification-service:8092"
    depends_on:
      redis:
        condition: service_healthy
      identity-auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - platform-net

  identity-auth-service:
    build:
      context: ./services/identity-auth-service
      dockerfile: Dockerfile
    container_name: identity-auth-service
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      DB_URL: jdbc:postgresql://postgres-auth:5432/auth_db
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_SECRET: "${JWT_SECRET:?Set JWT_SECRET in .env -- run: openssl rand -base64 32}"
      JWT_ACCESS_TTL_MINUTES: ${JWT_ACCESS_TTL_MINUTES:-15}
      JWT_REFRESH_TTL_DAYS: ${JWT_REFRESH_TTL_DAYS:-7}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres-auth:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - platform-net

  user-profile-service:
    build:
      context: ./services/user-profile-service
      dockerfile: Dockerfile
    container_name: user-profile-service
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      DB_URL: jdbc:postgresql://postgres-user-profile:5432/user_profile_db
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres-user-profile:
        condition: service_healthy
      kafka:
        condition: service_healthy
      identity-auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - platform-net

  broadcaster-service:
    build:
      context: ./services/broadcaster-service
      dockerfile: Dockerfile
    container_name: broadcaster-service
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres-broadcaster:5432/broadcaster_db
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      # Same HMAC secret used by identity-auth-service to sign tokens
      JWT_PUBLIC_KEY: ${JWT_SECRET:?Set JWT_SECRET in .env}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres-broadcaster:
        condition: service_healthy
      kafka:
        condition: service_healthy
      identity-auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - platform-net

  tipping-service:
    build:
      context: ./services/tipping-service
      dockerfile: Dockerfile
    container_name: tipping-service
    restart: unless-stopped
    ports:
      - "8085:8085"
    environment:
      DB_URL: jdbc:postgresql://postgres-tipping:5432/tipping_db
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_SECRET: "${JWT_SECRET:?Set JWT_SECRET in .env -- run: openssl rand -base64 32}"
      # wallet-service is on the same platform-net bridge
      WALLET_SERVICE_URL: http://wallet-service:8083
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres-tipping:
        condition: service_healthy
      kafka:
        condition: service_healthy
      wallet-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8085/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - platform-net

  payments-service:
    build:
      context: ./services/payments-service
      dockerfile: Dockerfile
    container_name: payments-service
    restart: unless-stopped
    ports:
      - "8084:8084"
    environment:
      DB_URL: jdbc:postgresql://postgres-payments:5432/payment_db
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_SECRET: "${JWT_SECRET:?Set JWT_SECRET in .env -- run: openssl rand -base64 32}"
      CCBILL_ACCOUNT_NUMBER: ${CCBILL_ACCOUNT_NUMBER:-888888}
      CCBILL_SUB_ACCOUNT: ${CCBILL_SUB_ACCOUNT:-0000}
      CCBILL_FLEX_FORM_ID: ${CCBILL_FLEX_FORM_ID:-}
      CCBILL_DIGEST_KEY: ${CCBILL_DIGEST_KEY:-}
      EPOCH_MERCHANT_ID: ${EPOCH_MERCHANT_ID:-}
      EPOCH_SECRET_KEY: ${EPOCH_SECRET_KEY:-}
      SEGPAY_MERCHANT_ID: ${SEGPAY_MERCHANT_ID:-}
      SEGPAY_SECRET_KEY: ${SEGPAY_SECRET_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres-payments:
        condition: service_healthy
      kafka:
        condition: service_healthy
      identity-auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8084/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - platform-net

  wallet-service:
    build:
      context: ./services/wallet-service
      dockerfile: Dockerfile
    container_name: wallet-service
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      DB_URL: jdbc:postgresql://postgres-wallet:5432/wallet_db
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_SECRET: "${JWT_SECRET:?Set JWT_SECRET in .env -- run: openssl rand -base64 32}"
      PLATFORM_FEE_BPS: ${PLATFORM_FEE_BPS:-500}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres-wallet:
        condition: service_healthy
      kafka:
        condition: service_healthy
      identity-auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - platform-net

  chat-service:
    build:
      context: ./services/chat-service
      dockerfile: Dockerfile
    container_name: chat-service
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      PORT: "8086"
      JWT_SECRET: "${JWT_SECRET:?Set JWT_SECRET in .env -- run: openssl rand -base64 32}"
      REDIS_URL: "redis://redis:6379"
      SCYLLA_HOSTS: "scylla:9042"
      SCYLLA_KEYSPACE: "chat"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TIPPING_TOPIC: "tipping.events"
      KAFKA_GROUP_ID: "chat-service"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      RATE_LIMIT_MESSAGES: ${RATE_LIMIT_MESSAGES:-5}
      RATE_LIMIT_WINDOW_SEC: ${RATE_LIMIT_WINDOW_SEC:-5}
    depends_on:
      redis:
        condition: service_healthy
      scylla:
        condition: service_healthy
      kafka:
        condition: service_healthy
      identity-auth-service:
        condition: service_healthy
    healthcheck:
