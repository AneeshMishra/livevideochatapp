# Root docker-compose — runs ALL services + shared infrastructure
#
# Usage:
#   cp .env.example .env   # fill in JWT_SECRET (see below)
#   docker compose up --build
#
# JWT_SECRET must be a base64-encoded 256-bit random key shared by all services.
# Generate with:  openssl rand -base64 32
#
# Services running:
#   8080  broadcaster-service           — broadcaster profiles, tip menus, stream config
#   8081  identity-auth-service         — registration, login, JWT issuance
#   8082  user-profile-service          — viewer profiles, follows, blocklist
#   8083  wallet-service                — token balances, double-entry ledger, transfers
#   8084  payments-service              — token purchases via CCBill/Epoch/SegPay, webhook handling
#   8085  tipping-service               — tip send/receive, tip-menu, goal tracking, Kafka fan-out
#   8086  chat-service                  — real-time WebSocket chat, Redis fan-out, ScyllaDB history
#   8087  presence-service              — online/offline state, viewer counts, heartbeat TTL in Redis
#   8088  streaming-orchestration       — room lifecycle, IVS channel provision, WebRTC→LL-HLS promotion
#   8089  catalog-discovery-service     — live grid, search, categories, trending; OpenSearch + Redis
#   8090  moderation-service            — AI frame scanning, CSAM detection, human review queue, DMCA
#   8091  private-show-billing-service  — per-minute billing meter, session reconciliation; Redis + Postgres
#   8000  api-gateway-service           — edge routing, JWT validation, rate-limiting, CORS, BFF aggregation
#   8093  kyc-service                   — age verification (18+), 2257 immutable record store, Veriff/Persona/MOCK vendor
#   8092  notification-service          — multi-channel notifications (push/email/in-app), follower fan-out, opt-out prefs

services:

  # ════════════════════════════════════════════════════════════════════════════
  # SHARED INFRASTRUCTURE
  # ════════════════════════════════════════════════════════════════════════════

  # ── Redis (shared: chat pub/sub fan-out, presence, rate-limiting, leaderboards)
  redis:
    image: redis:7-alpine
    container_name: platform-redis
    restart: unless-stopped
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru --appendonly no
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - platform-net

  # ── MinIO (S3-compatible object storage for moderation frame captures, VOD, media)
  minio:
    image: minio/minio:latest
    container_name: platform-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - "9000:9000"    # S3 API endpoint
      - "9001:9001"    # MinIO web console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - platform-net

  # ── OpenSearch (catalog discovery, full-text search)
  opensearch:
    image: opensearchproject/opensearch:2.13.0
    container_name: platform-opensearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=Admin@1234!
      - plugins.security.disabled=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - platform-net

  # ── ScyllaDB (chat history — high write throughput, time-series, 7-day TTL)
  scylla:
    image: scylladb/scylla:6.0
    container_name: platform-scylla
    restart: unless-stopped
    # Developer mode: disable CPU pinning; tune for a single shared host
    command: --smp 1 --memory 1G --overprovisioned 1 --developer-mode 1
    ports:
      - "9042:9042"
    volumes:
      - scylla-data:/var/lib/scylla
    healthcheck:
      test: ["CMD-SHELL", "nodetool status | grep -E '^UN'"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 90s
    networks:
      - platform-net

  # Single Kafka in KRaft mode (no Zookeeper required)
  kafka:
    image: confluentinc/cp-kafka:7.7.0
    container_name: platform-kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: platform-cluster-01
    ports:
      - "29092:29092"     # host access for local tools (Kafka UI, kafkacat)
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 8
    networks:
      - platform-net

  # Kafka UI (optional dev tool — http://localhost:8090)
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: platform-kafka-ui
    restart: unless-stopped
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: platform
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - platform-net
    profiles: ["tools"]   # only started with: docker compose --profile tools up

  # ════════════════════════════════════════════════════════════════════════════
  # DATABASES (one per service — database-per-service pattern)
  # ════════════════════════════════════════════════════════════════════════════

  postgres-auth:
    image: postgres:16-alpine
    container_name: platform-postgres-auth
    restart: unless-stopped
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5433:5432"
    volumes:
      - postgres-auth-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - platform-net

  postgres-broadcaster:
