      KAFKA_STREAMING_TOPIC: "streaming.events"
      KAFKA_MODERATION_TOPIC: "moderation.events"
      KAFKA_PRIVATE_SHOW_TOPIC: "private-show.events"
      KAFKA_USER_PROFILE_TOPIC: "user-profile.events"
      BROADCASTER_SERVICE_URL: "http://broadcaster-service:8080"
      EMAIL_PROVIDER: "${EMAIL_PROVIDER:-MOCK}"
      SENDGRID_API_KEY: "${SENDGRID_API_KEY:-}"
      PUSH_PROVIDER: "${PUSH_PROVIDER:-MOCK}"
      FCM_SERVER_KEY: "${FCM_SERVER_KEY:-}"
      PUSH_RATE_LIMIT_PER_HOUR: "${PUSH_RATE_LIMIT_PER_HOUR:-20}"
      EMAIL_RATE_LIMIT_PER_DAY: "${EMAIL_RATE_LIMIT_PER_DAY:-10}"
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres-notification:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      identity-auth-service:
        condition: service_healthy
    healthcheck:
