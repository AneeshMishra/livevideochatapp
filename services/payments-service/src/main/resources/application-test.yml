spring:
  datasource:
    url: jdbc:tc:postgresql:16-alpine:///payment_db
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
  flyway:
    enabled: true
  kafka:
    bootstrap-servers: ${spring.embedded.kafka.brokers:localhost:9092}
  jpa:
    hibernate:
      ddl-auto: validate

app:
  jwt:
    secret: dGVzdHNlY3JldGtleWZvcnVuaXR0ZXN0aW5nb25seW5vdHByb2Q=
  providers:
    ccbill:
      digest-key: ""
    epoch:
      secret-key: ""
    segpay:
      secret-key: ""

logging:
  level:
    com.platform.payments: DEBUG
