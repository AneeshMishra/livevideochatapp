services:

  # ── PostgreSQL (rooms, stream sessions) ────────────────────────────────────
  postgres-streaming:
    image: postgres:16-alpine
    container_name: streaming-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: streaming_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5439:5432"
    volumes:
      - streaming-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d streaming_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (room state cache, fast playback lookup) ─────────────────────────
  redis-streaming:
    image: redis:7-alpine
    container_name: streaming-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6382:6379"
    volumes:
      - streaming-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Kafka (streaming.events producer + presence.events consumer) ───────────
  kafka-streaming:
    image: confluentinc/cp-kafka:7.7.0
    container_name: streaming-kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-streaming:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-streaming:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: streaming-cluster-01
    ports:
      - "9101:9092"
    volumes:
      - streaming-kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Streaming Orchestration Service ───────────────────────────────────────
  streaming-orchestration-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: streaming-orchestration-service
    restart: unless-stopped
    ports:
      - "8088:8088"
    environment:
      PORT: "8088"
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET must be set}"
      DB_URL: "postgres://postgres:${POSTGRES_PASSWORD:-postgres}@postgres-streaming:5432/streaming_db"
      REDIS_URL: "redis://redis-streaming:6379"
      KAFKA_BOOTSTRAP_SERVERS: "kafka-streaming:9092"
      KAFKA_STREAMING_TOPIC: "streaming.events"
      KAFKA_PRESENCE_TOPIC: "presence.events"
      KAFKA_GROUP_ID: "streaming-orchestration-service"
      # Set to IVS for production; MOCK for local development
      STREAMING_PROVIDER: "${STREAMING_PROVIDER:-MOCK}"
      AWS_REGION: "${AWS_REGION:-us-east-1}"
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID:-}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY:-}"
      PROMOTION_THRESHOLD: "${PROMOTION_THRESHOLD:-1000}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
    depends_on:
      postgres-streaming:
        condition: service_healthy
      redis-streaming:
        condition: service_healthy
      kafka-streaming:
        condition: service_healthy

volumes:
  streaming-postgres-data:
  streaming-redis-data:
  streaming-kafka-data:
