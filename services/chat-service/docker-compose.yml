services:

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis-chat:
    image: redis:7-alpine
    container_name: chat-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6380:6379"
    volumes:
      - chat-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── ScyllaDB ───────────────────────────────────────────────────────────────
  scylla-chat:
    image: scylladb/scylla:6.0
    container_name: chat-scylla
    restart: unless-stopped
    command: --smp 1 --memory 512M --overprovisioned 1 --developer-mode 1
    ports:
      - "9042:9042"
    volumes:
      - chat-scylla-data:/var/lib/scylla
    healthcheck:
      test: ["CMD-SHELL", "nodetool status | grep -E '^UN'"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 60s

  # ── Kafka (KRaft mode) ─────────────────────────────────────────────────────
  kafka-chat:
    image: confluentinc/cp-kafka:7.7.0
    container_name: chat-kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-chat:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-chat:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: chat-cluster-01
    ports:
      - "9099:9092"
    volumes:
      - chat-kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Chat Service ───────────────────────────────────────────────────────────
  chat-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chat-service
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      PORT: "8086"
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET must be set}"
      REDIS_URL: "redis://redis-chat:6379"
      SCYLLA_HOSTS: "scylla-chat:9042"
      SCYLLA_KEYSPACE: "chat"
      KAFKA_BOOTSTRAP_SERVERS: "kafka-chat:9092"
      KAFKA_TIPPING_TOPIC: "tipping.events"
      KAFKA_GROUP_ID: "chat-service"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      RATE_LIMIT_MESSAGES: "${RATE_LIMIT_MESSAGES:-5}"
      RATE_LIMIT_WINDOW_SEC: "${RATE_LIMIT_WINDOW_SEC:-5}"
    depends_on:
      redis-chat:
        condition: service_healthy
      scylla-chat:
        condition: service_healthy
      kafka-chat:
        condition: service_healthy

volumes:
  chat-redis-data:
  chat-scylla-data:
  chat-kafka-data:
