services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres-user-profile:
    image: postgres:16-alpine
    container_name: user-profile-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: user_profile_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5435:5432"
    volumes:
      - user-profile-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d user_profile_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Kafka (KRaft mode) ─────────────────────────────────────────────────────
  kafka-user-profile:
    image: confluentinc/cp-kafka:7.7.0
    container_name: user-profile-kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-user-profile:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-user-profile:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: user-profile-cluster-01
    ports:
      - "9095:9092"
    volumes:
      - user-profile-kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── User Profile Service ───────────────────────────────────────────────────
  user-profile-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: user-profile-service
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      DB_URL: jdbc:postgresql://postgres-user-profile:5432/user_profile_db
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      KAFKA_BOOTSTRAP_SERVERS: kafka-user-profile:9092
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres-user-profile:
        condition: service_healthy
      kafka-user-profile:
        condition: service_healthy

volumes:
  user-profile-postgres-data:
  user-profile-kafka-data:
