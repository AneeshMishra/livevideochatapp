services:

  # ── Redis (presence TTL heartbeats, viewer counts, room sets) ──────────────
  redis-presence:
    image: redis:7-alpine
    container_name: presence-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6381:6379"
    volumes:
      - presence-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Kafka (KRaft mode, for presence.events) ────────────────────────────────
  kafka-presence:
    image: confluentinc/cp-kafka:7.7.0
    container_name: presence-kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-presence:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-presence:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: presence-cluster-01
    ports:
      - "9100:9092"
    volumes:
      - presence-kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Presence Service ───────────────────────────────────────────────────────
  presence-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: presence-service
    restart: unless-stopped
    ports:
      - "8087:8087"
    environment:
      PORT: "8087"
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET must be set}"
      REDIS_URL: "redis://redis-presence:6379"
      KAFKA_BOOTSTRAP_SERVERS: "kafka-presence:9092"
      KAFKA_PRESENCE_TOPIC: "presence.events"
      HEARTBEAT_TTL_SEC: "30"
      SWEEPER_INTERVAL_SEC: "30"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
    depends_on:
      redis-presence:
        condition: service_healthy
      kafka-presence:
        condition: service_healthy

volumes:
  presence-redis-data:
  presence-kafka-data:
