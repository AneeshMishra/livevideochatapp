server:
  port: ${PORT:8089}

spring:
  application:
    name: catalog-discovery-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5440/catalog_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
      lettuce:
        pool:
          max-active: 8
          max-idle: 4

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${KAFKA_GROUP_ID:catalog-discovery-service}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      enable-auto-commit: false
      max-poll-records: 100
    listener:
      ack-mode: BATCH

opensearch:
  url: ${OPENSEARCH_URL:http://localhost:9200}
  index:
    rooms: ${OPENSEARCH_ROOMS_INDEX:catalog_rooms}

kafka:
  topics:
    streaming: ${KAFKA_STREAMING_TOPIC:streaming.events}
    presence: ${KAFKA_PRESENCE_TOPIC:presence.events}

broadcaster:
  service-url: ${BROADCASTER_SERVICE_URL:http://broadcaster-service:8080}
  connect-timeout-ms: 2000
  read-timeout-ms: 3000

catalog:
  grid-cache-ttl-seconds: ${GRID_CACHE_TTL_SEC:10}
  room-cache-ttl-seconds: ${ROOM_CACHE_TTL_SEC:30}
  trending-max-rooms: ${TRENDING_MAX_ROOMS:50}

jwt:
  secret: ${JWT_SECRET}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: ${LOG_LEVEL:INFO}
    com.platform.catalog: ${LOG_LEVEL:INFO}
