spring:
  application:
    name: kyc-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/kyc_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 1

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 50MB

server:
  port: ${SERVER_PORT:8093}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}

app:
  jwt:
    secret: ${JWT_SECRET}

  # KYC vendor: MOCK | VERIFF | YOTI | PERSONA
  kyc:
    provider: ${KYC_PROVIDER:MOCK}
    veriff:
      api-key: ${VERIFF_API_KEY:}
      base-url: ${VERIFF_BASE_URL:https://stationapi.veriff.com}
      webhook-secret: ${VERIFF_WEBHOOK_SECRET:}
    persona:
      api-key: ${PERSONA_API_KEY:}
      webhook-secret: ${PERSONA_WEBHOOK_SECRET:}
    # KYC approval validity (default 2 years)
    validity-days: ${KYC_VALIDITY_DAYS:730}

  # Document storage (MinIO in dev, S3 in prod — both S3-compatible API)
  storage:
    bucket: ${S3_KYC_BUCKET:platform-kyc-docs}
    endpoint: ${S3_ENDPOINT_URL:http://minio:9000}
    access-key: ${S3_ACCESS_KEY:minioadmin}
    secret-key: ${S3_SECRET_KEY:minioadmin123}
    region: ${AWS_REGION:us-east-1}
    # MOCK — skip real uploads; REAL — upload to S3/MinIO
    provider: ${STORAGE_PROVIDER:MOCK}

  # AES-256 key (base64-encoded 32 bytes) for PII encryption in 2257 records
  # In production this key should be managed by KMS and rotated regularly
  encryption:
    key: ${ENCRYPTION_KEY:dGhpcyBpcyBhIDMyLWJ5dGUgZGV2IGtleS4uLi4h}

  kafka:
    topics:
      kyc-events: kyc.events

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.platform.kyc: ${LOG_LEVEL:INFO}
    org.hibernate.SQL: WARN
