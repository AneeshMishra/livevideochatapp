spring:
  application:
    name: broadcaster-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/broadcaster_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate          # Flyway owns DDL; Hibernate validates only
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        default_schema: public
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all                   # wait for all ISR replicas — required for outbox safety
      retries: 3
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 1
    consumer:
      group-id: broadcaster-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.platform.broadcaster.event"

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}

app:
  jwt:
    public-key: ${JWT_PUBLIC_KEY}    # RSA public key (PEM) from Identity service
  kafka:
    topics:
      broadcaster-events: broadcaster.events
      broadcaster-kyc-events: broadcaster.kyc.events

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
  show-actuator: false

logging:
  structured:
    format:
      console: ecs           # Elastic Common Schema — parsed by Loki/ELK
  level:
    com.platform.broadcaster: ${LOG_LEVEL:INFO}
    org.hibernate.SQL: WARN
