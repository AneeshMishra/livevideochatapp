services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres-tipping:
    image: postgres:16-alpine
    container_name: tipping-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tipping_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5438:5432"
    volumes:
      - tipping-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tipping_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Kafka (KRaft mode) ─────────────────────────────────────────────────────
  kafka-tipping:
    image: confluentinc/cp-kafka:7.7.0
    container_name: tipping-kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-tipping:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-tipping:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: tipping-cluster-01
    ports:
      - "9098:9092"
    volumes:
      - tipping-kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Tipping Service ────────────────────────────────────────────────────────
  tipping-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tipping-service
    restart: unless-stopped
    ports:
      - "8085:8085"
    environment:
      DB_URL: jdbc:postgresql://postgres-tipping:5432/tipping_db
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      KAFKA_BOOTSTRAP_SERVERS: kafka-tipping:9092
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET must be set}"
      # Point at your local wallet-service for dev
      WALLET_SERVICE_URL: ${WALLET_SERVICE_URL:-http://host.docker.internal:8083}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres-tipping:
        condition: service_healthy
      kafka-tipping:
        condition: service_healthy

volumes:
  tipping-postgres-data:
  tipping-kafka-data:
